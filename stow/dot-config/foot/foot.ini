# Rosé Pine

[colors]
background=191724
foreground=e0def4

regular0=26233a     # black (Overlay)
regular1=eb6f92     # red (Love)
regular2=9ccfd8     # green (Foam)
regular3=f6c177     # yellow (Gold)
regular4=31748f     # blue (Pine)
regular5=c4a7e7     # magenta (Iris)
regular6=ebbcba     # cyan (Rose)
regular7=e0def4     # white (Text)

bright0=47435d      # bright black (lighter Overlay)
bright1=ff98ba      # bright red (lighter Love)
bright2=c5f9ff      # bright green (lighter Foam)
bright3=ffeb9e      # bright yellow (lighter Gold)
bright4=5b9ab7      # bright blue (lighter Pine)
bright5=eed0ff      # bright magenta (lighter Iris)
bright6=ffe5e3      # bright cyan (lighter Rose)
bright7=fefcff      # bright white (lighter Text)

flash=f6c177        # yellow (Gold)

cursor=191724 e0def4

# transparency
alpha=0.9

[main]
# some applications only enable features like extended keys, if the term name has xterm in it
# term=xterm-foot

shell=bash -c 'tmux attach || sesh connect "$(pwd)"'

font=DankMono Nerd Font Mono:size=13, Symbols Nerd Font Mono:size=11, DejaVu Sans Mono:size=13, Apple Color Emoji:size=11
font-bold=DankMono Nerd Font Mono:size=13:weight=bold, Symbols Nerd Font Mono:size=11, DejaVu Sans Mono:size=13, Apple Color Emoji:size=11
font-italic=DankMono Nerd Font Mono:size=13:slant=italic, Symbols Nerd Font Mono:size=11, DejaVu Sans Mono:size=13, Apple Color Emoji:size=11
font-bold-italic=DankMono Nerd Font Mono:size=13:weight=bold:slant=italic, Symbols Nerd Font Mono:size=11, DejaVu Sans Mono:size=13, Apple Color Emoji:size=11
pad=3x3 center-when-maximized-and-fullscreen

[text-bindings]
# this is unicode PUA E000, which is mapped in tmux
=Control+Shift+space
[1;6Z=Control+Shift+ISO_Left_Tab
\x1b[116;6u=Control+Shift+t
\x1b[119;6u=Control+Shift+w
\x1b[1;6q=Control+Shift+1
\x1b[2;6q=Control+Shift+2
\x1b[3;6q=Control+Shift+3
\x1b[4;6q=Control+Shift+4

[bell]
urgent=yes
notify=yes

[tweak]
box-drawing-base-thickness=0.015
