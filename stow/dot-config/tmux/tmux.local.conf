# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'rose-pine/tmux'
set -g @plugin 'Chaitanyabsprip/tmux-harpoon'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'

# Remap prefix from Ctrl+b to Ctrl+a (avoids conflict with Vim)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# General settings
set -g status-position bottom
set -g base-index 1
set -s escape-time 10

# Rose Pine theme config
set -g @rose_pine_variant 'main'
set -g @rose_pine_host 'off'
set -g @rose_pine_user 'off'
set -g @rose_pine_date_time ''
set -g @rose_pine_bar_bg_disable 'on'
set -g @rose_pine_bar_bg_disabled_color_option 'default'
set -g @rose_pine_directory 'on'
set -g @rose_pine_disable_active_window_menu 'on'
set -g @rose_pine_show_pane_directory 'on'
set -g @rose_pine_window_separator ' '
set -g @rose_pine_status_left_prepend_section ' '
set -g @rose_pine_status_left_append_section '#[fg=#6e6a86] | '
set -g @rose_pine_window_status_separator '#[fg=#6e6a86] | '
set -g @rose_pine_status_right_prepend_section '#[fg=#ebbcba]#{pane_current_command}'
set -g @rose_pine_status_right_append_section ' '

# Bell / notification settings
set -g visual-bell off
set -g bell-action any
set -g monitor-bell on
set -g window-status-bell-style 'fg=red,bold'

# enable escape keys passthrough
set -g allow-passthrough on

# increase input buffer for sixel images (default 1MB is too small)
set -s input-buffer-size 4194304

# enable extended keys input support (CSI U modifiers)
set-option -g extended-keys on
set-option -g xterm-keys on
set-option -g  terminal-features 'foot*:extkeys'
set-option -ga terminal-features 'wezterm:extkeys'
set-option -ga terminal-features 'xterm*:extkeys'

# enable mouse
set -g mouse on

# vi mode keys in copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"

bind-key -n C-Tab next-window
# Ctrl+Shift+Tab: Ghostty sends CSI 1;6Z via keybind override
set -s user-keys[0] "\e[1;6Z"
bind-key -n User0 previous-window
bind-key -n C-S-Left previous-window
bind-key -n C-S-Right next-window
# Ctrl+Shift+T / Ctrl+Shift+W: with extended-keys on, tmux decodes
# CSI u sequences natively, so we bind the key names directly
bind-key -n C-S-t new-window -c "#{pane_current_path}"
# Smart kill-pane: close immediately if in a shell, confirm otherwise
bind-key -n C-S-w if-shell -F '#{||:#{==:#{pane_current_command},zsh},#{==:#{pane_current_command},bash}}' \
    kill-pane \
    'confirm-before -p "Kill pane running #{pane_current_command}? (y/n)" kill-pane'
bind-key x if-shell -F '#{||:#{==:#{pane_current_command},zsh},#{==:#{pane_current_command},bash}}' \
    kill-pane \
    'confirm-before -p "Kill pane running #{pane_current_command}? (y/n)" kill-pane'

# tmux-fingers config
# bind -n C-S-Space run -b "#{@fingers-cli} start #{pane_id}"
bind -n \uE000 run -b "#{@fingers-cli} start #{pane_id}"
set -g @fingers-pattern-0 '(?i)[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z0-9]+' # match email addresses and sfdc usernames
set -g @fingers-pattern-1 '(?i)[A-Z0-9]{5}[0-9][A-Z0-9]{9,12}(?=[\s\r\n])' # match sfdc ids
set -g @fingers-pattern-2 'force:\/\/[A-Za-z0-9]+::.+@[A-Za-z0-9-_.]+' # match sf auth urls
set -g @fingers-pattern-3 '\s-[A-Za-z0-9]{1}|\s--[A-Za-z0-9\-]+=?' # match flags from commands --help pages
set -g @fingers-pattern-4 '"(?<match>.+?)"' # match quoted strings
set -g @fingers-pattern-5 '`(?<match>.+?)`' # match content in backticks
set -g @fingers-pattern-6 'sha256-[A-Za-z0-9+/=]+' # nix sha256 hash

# -- "force:\\/\\/\\w+::.+@[\\w\\d-_.]+", -- match sf auth urls
# "\\s-\\w{1}|\\s--[\\w-]+=?", -- match flags from commands --help
# '"(.+?)"', -- match quoted strings 
# '`(.+?)`', -- match content in backticks
# 'sha256-[A-Za-z0-9+/=]+' -- nix sha256 hash

# Sesh recommended settings
set -g detach-on-destroy off  # don't exit tmux when closing a session
bind -N "last-session (via sesh)" L run-shell "sesh last"

# Override sesh popup size (home-manager defaults to 80%,70%)
bind-key "s" run-shell "sesh connect \"$(
  sesh list --icons | fzf --tmux 90%,85% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list --icons -t)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list --icons -c)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list --icons -z)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview '$HOME/.config/sesh/preview.sh {}' \
    -- --ansi
)\""

# Open new windows/panes in the current directory
bind-key c new-window -c "#{pane_current_path}"
bind-key '"' split-window -c "#{pane_current_path}"
bind-key '%' split-window -h -c "#{pane_current_path}"

# Harpoon: session bookmarking
# prefix h enters harpoon mode, then press a second key:
#   a = add, l = list (fzf), e = edit, d = delete, 1-4 = replace slot
bind h switch-client -T harpoon
bind -T harpoon a run '~/.config/tmux/plugins/tmux-harpoon/harpoon -a'
bind -T harpoon l run '~/.config/tmux/plugins/tmux-harpoon/harpoon -l'
bind -T harpoon e run '~/.config/tmux/plugins/tmux-harpoon/harpoon -e'
bind -T harpoon d run '~/.config/tmux/plugins/tmux-harpoon/harpoon -d'
bind -T harpoon 1 run '~/.config/tmux/plugins/tmux-harpoon/harpoon -r 1'
bind -T harpoon 2 run '~/.config/tmux/plugins/tmux-harpoon/harpoon -r 2'
bind -T harpoon 3 run '~/.config/tmux/plugins/tmux-harpoon/harpoon -r 3'
bind -T harpoon 4 run '~/.config/tmux/plugins/tmux-harpoon/harpoon -r 4'
# Jump to bookmarked sessions (no prefix, instant)
# Terminals send custom CSI sequences for C-S-1/2/3/4 (non-CSI-u to bypass extended-keys decoder)
set -s user-keys[1] "\e[1;6q"
set -s user-keys[2] "\e[2;6q"
set -s user-keys[3] "\e[3;6q"
set -s user-keys[4] "\e[4;6q"
bind -n User1 run '~/.config/tmux/plugins/tmux-harpoon/harpoon -s 1'
bind -n User2 run '~/.config/tmux/plugins/tmux-harpoon/harpoon -s 2'
bind -n User3 run '~/.config/tmux/plugins/tmux-harpoon/harpoon -s 3'
bind -n User4 run '~/.config/tmux/plugins/tmux-harpoon/harpoon -s 4'

# Install `tpm` if needed.
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# Activate the plugins.
run "~/.config/tmux/plugins/tpm/tpm"

